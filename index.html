ng speak-all" onclick="speakCurrent()">▶ EN ALL</button></header><nav id="nav"></nav><section id="view"></section><footer><p>事件不是答案，事件是資料。情緒不是命令，情緒是訊號。</p><small>EVENTS ARE DATA · EMOTIONS ARE SIGNALS · IDENTITY CAN BE UPDATED</small></footer></div><script>
const D=[["我不會。","I can't do this.","我還沒有建立這項能力。","I haven't built this ability yet.","練習最小的一步 5 分鐘。","Practice the smallest step for five minutes."],["我很焦慮。","I feel anxious.","我的預測需要更多資訊。","My prediction needs more information.","寫下三個未知數，查證一個。","List three unknowns and verify one."],["我做不到。","I can't do it.","我要拆成更小步驟。","I need to break it into smaller steps.","把任務縮小到十分鐘內。","Shrink the task to ten minutes."],["我失敗了。","I failed.","我得到新的資料。","I gained a new data point.","記下結果與下一個假設。","Record the result and next hypothesis."],["都是他的錯。","It's all their fault.","我的槓桿在哪裡？","Where is my leverage?","找出一件我能控制的事。","Name one thing I can control."],["太難了。","It's too hard.","先降低開始成本。","Lower the cost of starting.","只做第一步。","Take only the first step."],["沒辦法。","There's no way.","還有哪些選項？","What options remain?","列出三個可能方案。","List three possible options."],["我就是這樣。","That's just who I am.","人格是可以更新的。","Identity can be updated.","做一次符合新身份的選擇。","Make one choice aligned with your new identity."],["我很忙。","I'm too busy.","我需要重新排序價值。","I need to reprioritize value.","刪除一個低價值任務。","Remove one low-value task."],["一定會出錯。","It will definitely go wrong.","這是預測，不是事實。","This is a prediction, not a fact.","尋找一個支持與一個反證。","Find one supporting fact and one counterexample."],["我害怕改變。","I'm afraid of change.","我需要提升適應能力。","I need to strengthen my adaptability.","做一個可逆的小實驗。","Run one small reversible experiment."],["我不知道。","I don't know.","這是探索的起點。","This is the start of exploration.","提出一個可以查證的問題。","Ask one verifiable question."]];
const A=[["固定能力模型：把尚未學會，誤認為永遠不會。","A fixed-ability model: not learned yet is mistaken for never possible.","本質是能力尚未建立，不是能力不存在。","The essence is an unbuilt skill, not an absent potential.","限制是用身份判決取代學習與練習。","The limitation is replacing learning with an identity verdict.","槓桿是最小練習與即時回饋。","The leverage is tiny practice with immediate feedback.","可以控制練習時間、難度與回饋頻率。","You can control practice time, difficulty, and feedback frequency."],["不確定性等於危險的預測模型。","A prediction model that treats uncertainty as danger.","本質是資訊不足造成預測誤差。","The essence is a prediction error caused by missing information.","限制是把訊號當命令，讓焦慮接管決策。","The limitation is letting a signal command the decision.","槓桿是補充關鍵資訊並縮短預測範圍。","The leverage is gaining key information and shortening the forecast horizon.","可以控制呼吸、查證、下一步與資訊來源。","You can control breathing, verification, the next step, and information sources."],["全有全無模型：不能一次完成，就等於做不到。","An all-or-nothing model: if it cannot be finished at once, it cannot be done.","本質是任務尺度過大，不是能力為零。","The essence is an oversized task, not zero ability.","限制是沒有拆解，導致開始成本過高。","The limitation is no decomposition, making the starting cost too high.","槓桿是把任務切成可在十分鐘完成的步驟。","The leverage is a step small enough to finish in ten minutes.","可以控制步驟大小、開始時間與完成標準。","You can control step size, start time, and the definition of done."],["結果等於自我價值的模型。","A model that equates an outcome with self-worth.","本質是一次結果提供了新的環境資料。","The essence is that one result provides new environmental data.","限制是過早下結論，停止試驗與修正。","The limitation is concluding too early and stopping iteration.","槓桿是從結果提取可驗證的假設。","The leverage is extracting a testable hypothesis from the result.","可以控制紀錄、復盤、下一次實驗與樣本數。","You can control the record, review, next experiment, and sample size."],["外部控制模型：把全部因果與權力交給別人。","An external-control model that gives all causality and power to others.","本質是責任可能分散，但自己的槓桿仍然存在。","The essence is shared responsibility while personal leverage still exists.","限制是責怪會遮蔽自己可採取的行動。","The limitation is that blame hides available action.","槓桿是找出自己能改變的關鍵節點。","The leverage is locating the key node you can change.","可以控制界線、回應、溝通方式與下一個選擇。","You can control boundaries, responses, communication, and the next choice."],["難度等於不可能的模型。","A model that equates difficulty with impossibility.","本質是目前成本高，需要重新設計入口。","The essence is a high current cost that needs a redesigned entry point.","限制是尚未開始就用難度否定可能性。","The limitation is rejecting possibility before beginning.","槓桿是降低開始成本，而不是先征服全部。","The leverage is lowering the starting cost, not conquering everything.","可以控制第一步、工具、環境與求助方式。","You can control the first step, tools, environment, and how you ask for help."],["封閉選項模型：看不見方法，就認為沒有方法。","A closed-option model: an unseen method is treated as no method.","本質是選項尚未生成，不代表選項不存在。","The essence is that options have not been generated, not that none exist.","限制是太早停止搜尋與組合。","The limitation is stopping search and recombination too early.","槓桿是增加選項數量，再比較成本與風險。","The leverage is generating more options before comparing cost and risk.","可以控制提問方式、資訊來源與方案數量。","You can control the question, information sources, and number of options."],["固定人格模型：把過去權重誤認為永久命運。","A fixed-identity model that mistakes past weights for permanent destiny.","本質是人格由重複選擇與習慣持續更新。","The essence is that identity is updated by repeated choices and habits.","限制是舊標籤會阻止新行為成為證據。","The limitation is that old labels block new behavior from becoming evidence.","槓桿是每天做一次符合新身份的微小選擇。","The leverage is one small daily choice aligned with the new identity.","可以控制今天的行為、環境提示與重複次數。","You can control today's behavior, environmental cues, and repetitions."],["時間稀缺模型：把忙碌誤認為全部都重要。","A time-scarcity model that mistakes busyness for importance.","本質是價值排序不清，而不只是時間不足。","The essence is unclear prioritization, not merely insufficient time.","限制是低價值任務持續消耗注意力。","The limitation is low-value work continuously consuming attention.","槓桿是刪除、延後或委派低價值工作。","The leverage is deleting, delaying, or delegating low-value work.","可以控制優先順序、行程、界線與專注區塊。","You can control priorities, schedule, boundaries, and focus blocks."],["確定性模型：把主觀預測當成客觀事實。","A certainty model that treats a subjective forecast as objective fact.","本質是未來仍有機率分布，不是單一答案。","The essence is a probability distribution, not one certain future.","限制是災難化預測會縮小行動與學習。","The limitation is that catastrophic forecasting narrows action and learning.","槓桿是尋找反證並進行低成本測試。","The leverage is finding counterevidence and running a low-cost test.","可以控制準備程度、風險上限與測試規模。","You can control preparation, risk limits, and test size."],["改變等於威脅的模型。","A model that equates change with threat.","本質是系統需要提升適應力與安全感。","The essence is a system that needs more adaptability and safety.","限制是為了避免短期不適，放棄長期成長。","The limitation is sacrificing long-term growth to avoid short-term discomfort.","槓桿是可逆、低風險的小實驗。","The leverage is a small, reversible, low-risk experiment.","可以控制變動幅度、速度、退路與觀察指標。","You can control the size, speed, exit path, and observation metrics."],["知道才有價值的模型：把不知道視為缺陷。","A knowledge-equals-worth model that treats not knowing as a defect.","本質是不知道是建立新知識的入口。","The essence is that not knowing is the entrance to new knowledge.","限制是假裝知道會關閉提問與查證。","The limitation is that pretending to know closes inquiry and verification.","槓桿是提出一個清楚、可查證的問題。","The leverage is one clear, verifiable question.","可以控制問題品質、查證來源與學習順序。","You can control question quality, sources, and learning sequence."]];const Q=[["這句話是舊語言嗎？","Is this old language?"],["這句話真正代表什麼模型？","What model does this sentence truly represent?"],["真正的本質是什麼？","What is the true essence?"],["真正的限制是什麼？","What is the real limitation?"],["真正的槓桿是什麼？","What is the real leverage?"],["真正可以控制的是什麼？","What can truly be controlled?"],["今天可以更新哪一句？","Which sentence can I update today?"],["今天可以行動哪一步？","What step can I take today?"]];const T=[["抱怨","觀察","complaints","observations"],["情緒","資訊","emotions","information"],["恐懼","訊號","fear","a signal"],["焦慮","提醒","anxiety","a reminder"],["壓力","訓練","pressure","training"],["困難","挑戰","difficulty","a challenge"],["失敗","教材","failure","a lesson"],["錯誤","回饋","mistakes","feedback"],["挫折","修正","setbacks","correction"],["問題","任務","problems","tasks"],["障礙","條件","obstacles","conditions"],["限制","設計","limits","design constraints"],["危機","機會","crisis","opportunity"],["風險","管理","risk","management"],["未知","探索","the unknown","exploration"],["混亂","結構","chaos","structure"],["資訊","知識","information","knowledge"],["知識","模型","knowledge","a model"],["模型","能力","models","ability"],["能力","成果","ability","results"],["成果","價值","results","value"],["價值","信任","value","trust"],["比較","學習","comparison","learning"],["嫉妒","方向","envy","direction"],["競爭","合作","competition","cooperation"],["衝突","對話","conflict","dialogue"],["批評","校準","criticism","calibration"],["拒絕","篩選","rejection","filtering"],["孤單","沉澱","solitude","reflection"],["等待","準備","waiting","preparation"],["空白","創造","blank space","creation"],["忙碌","聚焦","busyness","focus"],["努力","方法","effort","method"],["堅持","習慣","persistence","habit"],["習慣","身份","habits","identity"],["選擇","未來","choices","the future"],["目標","導航","goals","navigation"],["夢想","計畫","dreams","plans"],["計畫","行動","plans","action"],["行動","證據","action","evidence"],["證據","信心","evidence","confidence"],["時間","資產","time","an asset"],["資源","槓桿","resources","leverage"],["科技","助手","technology","an assistant"],["閱讀","輸入","reading","input"],["思考","整理","thinking","organization"],["洞察","決策","insight","a decision"],["回饋","更新","feedback","an update"],["經驗","智慧","experience","wisdom"],["人生","作品","life","a work of art"]];const C=[["今天，開始把","Today, "],["每天練習把","Each day, "],["遇到問題時，把","When problems arise, "],["壓力出現時，把","When pressure appears, "],["做決策以前，把","Before making a decision, "],["開始工作時，把","At the start of work, "],["進入學習時，把","When learning begins, "],["在人際關係裡，把","In relationships, "],["一次失敗之後，把","After a failure, "],["面對未知的時候，把","When facing the unknown, "],["需要改變時，把","When change is needed, "],["感到卡住時，把","When feeling stuck, "],["準備行動時，把","When preparing to act, "],["回顧一天時，把","When reviewing the day, "],["建立新習慣時，把","When building a
